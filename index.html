<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.95);
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 50px;
            font-size: 1.25rem;
            font-weight: 500;
        }

        .nav a:hover {
            color: #4ade80;
        }

        .main {
            padding-top: 160px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NZ</div>
        <div class="nav">
            <a href="#" onclick="alert('Shop section coming')">Shop</a>
            <a href="#" onclick="alert('Scripts section coming')">Scripts</a>
        </div>
    </header>

    <div class="main">
        <h1 style="font-size: 5rem; margin-bottom: 20px;">Welcome to NZ</h1>
        <p style="font-size: 1.6rem; color: #888;">Shop & Scripts</p>
    </div>

</body>
</html>
