<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 6%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: -1px; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        section {
            padding: 140px 6% 100px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 50px;
            font-family: 'Space Grotesk', sans-serif;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NZ</div>
    </header>

    <!-- Bare bones right now -->
    <section id="main">
        <h2>we here</h2>
        <p style="text-align:center; color:#666; font-size:1.4rem;">
            stripped clean. tell me what you wanna add first
        </p>
    </section>

    <footer>
        Miami, Florida
    </footer>

</body>
</html>
