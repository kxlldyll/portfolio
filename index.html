<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ • Product</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            margin-top: 40px;
        }

        .left {
            background: #111;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .right h1 {
            font-size: 2.4rem;
            margin-bottom: 8px;
        }

        .price {
            font-size: 2.8rem;
            color: #4ade80;
            font-weight: 700;
        }

        .option {
            background: #1f1f1f;
            padding: 18px 24px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover {
            background: #4ade80;
            color: black;
        }

        .buy-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
        }

        .buy-now { background: #3b82f6; color: white; border: none; }
        .add-cart { background: #333; color: white; border: none; }
    </style>
</head>
<body>

    <div class="product-detail">
        <!-- Left side -->
        <div class="left">
            <h2 style="margin-bottom:30px;">17+ Age Verified Accounts</h2>
            <div style="font-size:140px; opacity:0.15;">🛡️</div>
            <p style="margin-top:40px; color:#888;">Clean accounts • Trusted seller</p>
        </div>

        <!-- Right side -->
        <div>
            <h1>17+ Age Verified Accounts</h1>
            <div class="price">$25+</div>
            
            <p style="margin: 25px 0 15px; color:#aaa;">Choose option</p>
            
            <div class="option" onclick="this.style.background='#4ade80'; this.style.color='black'">
                <div>
                    <strong>30 Day Access</strong><br>
                    <span style="color:#4ade80; font-size:0.9rem;">● 55 in stock</span>
                </div>
                <strong>$25</strong>
            </div>

            <div class="option" onclick="this.style.background='#4ade80'; this.style.color='black'">
                <div>
                    <strong>90 Day Access</strong><br>
                    <span style="color:#4ade80; font-size:0.9rem;">● 42 in stock</span>
                </div>
                <strong>$45</strong>
            </div>

            <div class="option" onclick="this.style.background='#4ade80'; this.style.color='black'">
                <div>
                    <strong>Lifetime Access</strong><br>
                    <span style="color:#4ade80; font-size:0.9rem;">● 28 in stock</span>
                </div>
                <strong>$80</strong>
            </div>

            <button class="buy-btn buy-now" onclick="buyNow()">Buy Now</button>
            <button class="buy-btn add-cart" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <script>
        function buyNow() {
            alert("Order started!\n\nDM NZ on Discord to finalize payment (Robux or Crypto)");
        }
        function addToCart() {
            alert("Added to cart 💰");
        }
    </script>
</body>
</html>
